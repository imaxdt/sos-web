services:
  db:
    image: mariadb:11
    container_name: sos-web-db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
      MARIADB_DATABASE: ${DB_NAME:-sos_recuperi}
      MARIADB_USER: ${DB_USER:-sos_user}
      MARIADB_PASSWORD: ${DB_PASSWORD:-sos_password}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - sos_web_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:latest
    container_name: sos-web-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - db

  mailpit:
    image: axllent/mailpit:latest
    container_name: sos-web-mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"

volumes:
  sos_web_db_data:
